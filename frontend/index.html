<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctor Hub - Premium Healthcare Consultation Network</title>
  </head>
  <body>
    <!-- Hatched Grid Overlay (z-index: 9999) -->
    <div class="grid-overlay"></div>

    <!-- Floating fluid background mesh blobs -->
    <div class="blur-blob blur-blob-pink"></div>
    <div class="blur-blob blur-blob-purple"></div>
    <div class="blur-blob blur-blob-cyan"></div>

    <!-- Floating cartoon background particles -->
    <div class="cartoon-particle" style="left: 10%; animation-delay: 0s; animation-duration: 14s;"></div>
    <div class="cartoon-particle cartoon-particle-2" style="left: 25%; animation-delay: -4s; animation-duration: 22s;"></div>
    <div class="cartoon-particle cartoon-particle-3" style="left: 45%; animation-delay: -8s; animation-duration: 12s;"></div>
    <div class="cartoon-particle cartoon-particle-2" style="left: 65%; animation-delay: -2s; animation-duration: 18s;"></div>
    <div class="cartoon-particle cartoon-particle-3" style="left: 80%; animation-delay: -11s; animation-duration: 15s;"></div>
    <div class="cartoon-particle" style="left: 92%; animation-delay: -5s; animation-duration: 26s;"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
